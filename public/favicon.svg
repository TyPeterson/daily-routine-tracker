<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="115" fill="#e9e7e0"/>
  <!-- dial tick ring -->
  <g stroke="#17171a" stroke-width="7" stroke-linecap="round">
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(0 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(30 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(60 256 232)"/>
