    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(120 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(150 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(180 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(210 256 232)"/>
    <line x1="256" y1="84" x2="256" y2="66" transform="rotate(240 256 232)"/>
