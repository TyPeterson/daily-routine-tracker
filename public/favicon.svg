    <circle cx="172" cy="428" r="17" fill="#ff4d00"/>
    <circle cx="228" cy="428" r="17" fill="#d92b21"/>
    <circle cx="284" cy="428" r="17" fill="#0055d4"/>
    <circle cx="340" cy="428" r="17" fill="#eab000"/>
